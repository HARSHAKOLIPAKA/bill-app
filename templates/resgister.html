<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #ff4b2b;
    color: white;
    border-radius: 8px;
    cursor: pointer;
}

a {
    display: block;
    text-align: center;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="box">

<h2>Register</h2>

<form method="POST">
    <input name="username" placeholder="Username" required>
    <button type="submit">Register</button>
</form>

<a href="/login">Already have account?</a>

</div>

</body>
</html>
