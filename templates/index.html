<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borewell Bill System</title>

    <style>
        body {
            font-family: Arial;
            background: #eef2f3;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 420px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>💧 Borewell Bill</h2>

    <form action="/generate" method="POST">

        <input type="text" name="name" placeholder="Customer Name" required>

        <input type="number" name="depth" placeholder="Depth (feet)" required>

        <input type="number" name="rate" placeholder="Rate per foot" required>

        <input type="number" name="advance" placeholder="Advance Paid" required>

        <button type="submit">Generate PDF Bill</button>

    </form>

    <div class="note">
        Made for fast billing 💼
    </div>

</div>

</body>
</html>
