<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borewell Billing System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #eef2f3;
            margin: 0;
            padding: 0;
        }

        /* NAVBAR */
        .navbar {
            background: #2c3e50;
            color: white;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar .title {
            font-size: 18px;
            font-weight: bold;
        }

        .navbar a {
            background: red;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        /* MAIN BOX */
        .container {
            width: 90%;
            max-width: 420px;
            margin: 25px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 0px 12px rgba(0,0,0,0.2);
            box-sizing: border-box;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .note {
            text-align: center;
            font-size: 12px;
            color: gray;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="title">💧 Borewell Billing System</div>
    <a href="/logout">Logout</a>
</div>

<!-- FORM -->
<div class="container">

    <h2>Generate Bill</h2>

    <form action="/generate" method="POST">

        <input type="text" name="name" placeholder="Customer Name" required>

        <input type="number" name="depth" placeholder="Depth (feet)" required>

        <input type="number" name="rate" placeholder="Rate per foot" required>

        <input type="number" name="advance" placeholder="Advance Paid" required>

        <button type="submit">Generate PDF Bill</button>

    </form>

    <div class="note">
        Professional billing system for borewell work 💼
    </div>

</div>

</body>
</html>
