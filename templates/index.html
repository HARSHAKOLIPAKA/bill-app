<!DOCTYPE html>
<html>
<head>
    <title>Borewell Bill</title>
</head>
<body>

<h2>Borewell Bill Generator</h2>

<form action="/generate" method="POST">

    <input type="text" name="name" placeholder="Customer Name" required><br><br>

    <input type="number" name="depth" placeholder="Depth (feet)" required><br><br>

    <input type="number" name="rate" placeholder="Rate per foot" required><br><br>

    <input type="number" name="advance" placeholder="Advance Paid" required><br><br>

    <button type="submit">Generate PDF Bill</button>

</form>

</body>
</html>
