<!DOCTYPE html>
<html>
<head>
    <title>Borewell Bill System</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 350px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
        }

        button {
            padding: 10px;
            width: 95%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Borewell Bill Entry</h2>

        <form action="/bill" method="POST">

            <input type="text" name="name" placeholder="Customer Name" required>

            <input type="number" name="depth" placeholder="Depth (feet)" required>

            <input type="number" name="rate" placeholder="Rate per foot" required>

            <input type="number" name="advance" placeholder="Advance Paid" required>

            <button type="submit">Generate Bill</button>

        </form>
    </div>

</body>
</html>
