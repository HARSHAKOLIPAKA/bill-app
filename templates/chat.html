<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

.container {
    display: flex;
    height: 100vh;
}

/* CHAT AREA */
.chat {
    width: 100%;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
}

#box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: white;
    padding: 8px;
    margin: 5px;
    border-radius: 10px;
}

.input {
    display: flex;
    padding: 10px;
    background: white;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    margin-left: 5px;
}
</style>

</head>

<body>

<div class="chat">

<div class="header">
Welcome {{ user }}
<a href="/logout" style="float:right;">Logout</a>
</div>

<div id="box"></div>

<div class="input">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

</div>

<script>
var socket = io();

/* SEND */
function send() {
    let msg = document.getElementById("msg").value;
    socket.send(msg);
    document.getElementById("msg").value = "";
}

/* RECEIVE */
socket.on("message", function(data) {
    document.getElementById("box").innerHTML +=
        `<div class="msg"><b>${data.user}</b>: ${data.message}</div>`;
});
</script>

</body>
</html>
