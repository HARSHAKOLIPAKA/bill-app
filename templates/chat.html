<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f0f2f5;
}

.container{
display:flex;
height:100vh;
}

/* USERS */
.sidebar{
width:25%;
background:white;
padding:10px;
border-right:1px solid #ddd;
}

.user{
padding:8px;
border-bottom:1px solid #eee;
}

/* CHAT */
.chat{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
background:white;
border-bottom:1px solid #ddd;
}

#box{
flex:1;
overflow-y:auto;
padding:10px;
}

.msg{
background:white;
padding:10px;
margin:6px;
border-radius:10px;
max-width:60%;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.input{
display:flex;
padding:10px;
background:white;
}

input{
flex:1;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-left:5px;
padding:10px;
background:#4facfe;
color:white;
border:none;
border-radius:8px;
}
</style>

</head>

<body>

<div class="container">

<div class="sidebar">
<h3>🟢 Online Users</h3>
<div id="users"></div>
</div>

<div class="chat">

<div class="header">
Welcome {{ user }} | <a href="/logout">Logout</a>
</div>

<div id="box"></div>

<div class="input">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>
var socket = io();

/* SEND */
function send(){
let msg=document.getElementById("msg").value;
socket.send(msg);
document.getElementById("msg").value="";
}

/* MESSAGE */
socket.on("message",function(data){
document.getElementById("box").innerHTML +=
`<div class="msg"><b>${data.user}</b><br>${data.message}</div>`;
});

/* USERS */
socket.on("users",function(data){
let u=document.getElementById("users");
u.innerHTML="";
data.forEach(x=>{
u.innerHTML += `<div class="user">🟢 ${x}</div>`;
});
});
</script>

</body>
</html>
