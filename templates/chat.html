<!DOCTYPE html>
<html>
<head>
<title>Chat App</title>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #eef2f7;
}

.container {
    display: flex;
    height: 100vh;
}

/* USERS */
.left {
    width: 25%;
    background: white;
    border-right: 1px solid #ddd;
    padding: 10px;
}

/* CHAT */
.right {
    width: 75%;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    background: white;
    border-bottom: 1px solid #ddd;
}

#box {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: white;
    padding: 8px;
    margin: 5px;
    border-radius: 10px;
}

.input {
    display: flex;
    padding: 10px;
    background: white;
}

input {
    flex: 1;
    padding: 10px;
}

button {
    padding: 10px;
    margin-left: 5px;
}
</style>

</head>

<body>

<div class="container">

<div class="left">
<h3>Online Users</h3>
<div id="users"></div>
</div>

<div class="right">

<div class="header">
Welcome {{ user }}
</div>

<div id="box"></div>

<div class="input">
<input id="msg">
<button onclick="send()">Send</button>
</div>

</div>

</div>

<script>
var socket = io();

/* SEND */
function send() {
    let msg = document.getElementById("msg").value;
    socket.send(msg);
    document.getElementById("msg").value = "";
}

/* RECEIVE */
socket.on("message", function(data) {
    document.getElementById("box").innerHTML +=
        `<div class="msg"><b>${data.user}</b>: ${data.message}</div>`;
});

/* USERS */
socket.on("users", function(data) {
    let u = document.getElementById("users");
    u.innerHTML = "";
    data.forEach(x => {
        u.innerHTML += `<p>🟢 ${x}</p>`;
    });
});
</script>

</body>
</html>
