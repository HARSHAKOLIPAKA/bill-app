<!DOCTYPE html>
<html>
<head>
    <title>Chat</title>
    <style>
        body { margin:0; font-family: Arial; background:#ece5dd; }

        .header {
            background:#075e54;
            color:white;
            padding:15px;
        }

        .chat-box {
            height:80vh;
            overflow-y:auto;
            padding:10px;
            display:flex;
            flex-direction:column;
        }

        .msg {
            max-width:60%;
            padding:10px;
            margin:5px;
            border-radius:10px;
        }

        .me { background:#dcf8c6; align-self:flex-end; }
        .other { background:white; align-self:flex-start; }

        .input-box {
            display:flex;
            padding:10px;
            background:#f0f0f0;
        }

        input {
            flex:1;
            padding:10px;
            border-radius:20px;
            border:none;
        }

        button {
            margin-left:10px;
            padding:10px 15px;
            border:none;
            background:#075e54;
            color:white;
            border-radius:50%;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="header">Live Chat</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-box">
    <input type="text" id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">➤</button>
</div>

<script>
    const chatBox = document.getElementById("chatBox");

    // 👉 Load messages
    async function loadMessages() {
        const res = await fetch('/get_messages');
        const data = await res.json();

        chatBox.innerHTML = "";

        data.forEach(msg => {
            let div = document.createElement("div");
            div.classList.add("msg");

            if (msg.user === "{{ session['user'] }}") {
                div.classList.add("me");
                div.innerHTML = "<b>You:</b> " + msg.message;
            } else {
                div.classList.add("other");
                div.innerHTML = "<b>" + msg.user + ":</b> " + msg.message;
            }

            chatBox.appendChild(div);
        });

        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 👉 Send message
    async function sendMessage() {
        let input = document.getElementById("messageInput");
        let message = input.value;

        if (message.trim() === "") return;

        await fetch('/send_message', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        input.value = "";
        loadMessages();
    }

    // 👉 Auto update every 1 sec
    setInterval(loadMessages, 1000);

    loadMessages();
</script>

</body>
</html>
