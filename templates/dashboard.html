<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

```
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: #f4f6f9;
    }

    .navbar {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .navbar h2 {
        margin: 0;
    }

    .logout-btn {
        background: white;
        color: #764ba2;
        padding: 8px 15px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
    }

    .container {
        padding: 30px;
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
    }

    .card {
        background: white;
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card h3 {
        margin: 0 0 10px;
        color: #333;
    }

    .card p {
        color: #666;
    }

    .btn {
        display: inline-block;
        margin-top: 10px;
        padding: 10px 15px;
        background: #667eea;
        color: white;
        border-radius: 8px;
        text-decoration: none;
    }

    .welcome {
        margin-bottom: 20px;
        font-size: 20px;
        font-weight: 600;
    }
</style>
```

</head>

<body>

<div class="navbar">
    <h2>Borewell Dashboard</h2>
    <a href="/logout" class="logout-btn">Logout</a>
</div>

<div class="container">

```
<div class="welcome">
    Welcome, {{ session['user'] }} 👋
</div>

<div class="cards">

    <div class="card">
        <h3>Create Bill</h3>
        <p>Generate new borewell bill</p>
        <a href="/home" class="btn">Go</a>
    </div>

    <div class="card">
        <h3>Bill History</h3>
        <p>View all previous bills</p>
        <a href="#" class="btn">Coming Soon</a>
    </div>

    <div class="card">
        <h3>Profile</h3>
        <p>Manage your account</p>
        <a href="#" class="btn">Coming Soon</a>
    </div>

</div>
```

</div>

</body>
</html>
