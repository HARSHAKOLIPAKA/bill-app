<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatSphere - Ultimate Real-time Chat Platform</title>

<meta name="description" content="Join ChatSphere - real-time chat platform">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
height:100vh;
background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.container{text-align:center;}

.logo{font-size:4em;margin-bottom:20px;}

h1{font-size:2.5em;margin-bottom:10px;}

.subtitle{margin-bottom:30px;}

input{
padding:15px;
border-radius:30px;
border:none;
outline:none;
margin-bottom:20px;
width:250px;
}

.chat-btn{
padding:15px 30px;
border:none;
border-radius:50px;
background:white;
color:#333;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">💬</div>
<h1>ChatSphere</h1>
<p class="subtitle">Real-time messaging platform</p>

<!-- 🔥 CHANGED: FORM instead of link -->
<form method="POST">
<input type="text" name="username" placeholder="Enter username" required>
<br>
<button class="chat-btn">🚀 Start Chat</button>
</form>

</div>

</body>
</html>
