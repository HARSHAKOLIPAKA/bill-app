<!DOCTYPE html>
<html>
<head>
    <title>Login - Borewell System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #27ae60);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 30px 25px;
            border-radius: 15px;
            width: 320px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 13px;
            color: gray;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #27ae60;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #219150;
        }

        .error {
            color: red;
            font-size: 13px;
            margin-bottom: 10px;
        }

        .footer {
            margin-top: 15px;
            font-size: 11px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="login-box">

    <div class="title">💧 Borewell System</div>
    <div class="subtitle">Secure Login</div>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        <input type="text" name="username" placeholder="👤 Username" required>

        <input type="password" name="password" placeholder="🔒 Password" required>

        <button type="submit">Login</button>

    </form>

    <div class="footer">
        Powered by Harsha ⚡
    </div>

</div>

</body>
</html>
