<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#00c6ff,#0072ff);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:35px;
width:320px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
background:#ff416c;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<div class="card">
<h2>Create Account</h2>

<form method="POST">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<button>Register</button>
</form>

<a href="/login">Login</a>
</div>

</body>
</html>
